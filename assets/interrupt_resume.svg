<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>EduTutor AI — Interrupt-Resume Cycle</title>
<desc>Animated step-by-step diagram of the LangGraph interrupt-resume cycle used in EduTutor AI</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- pulse for interrupt node -->
  <style>
    @keyframes fadeUp   { 0%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes dash     { to{stroke-dashoffset:-16} }
    @keyframes pulse    { 0%,100%{opacity:.35} 50%{opacity:1} }
    @keyframes dot      { 0%,100%{r:4} 50%{r:6} }
    @keyframes glow     { 0%,100%{opacity:.4} 50%{opacity:.9} }

    .n0  { animation: fadeUp .5s .1s both }
    .n1  { animation: fadeUp .5s .5s both }
    .n2  { animation: fadeUp .5s .9s both }
    .n3  { animation: fadeUp .5s 1.3s both }
    .n4  { animation: fadeUp .5s 1.7s both }
    .n5  { animation: fadeUp .5s 2.1s both }
    .n6  { animation: fadeUp .5s 2.5s both }
    .e0  { animation: fadeUp .4s .7s both }
    .e1  { animation: fadeUp .4s 1.1s both }
    .e2  { animation: fadeUp .4s 1.5s both }
    .e3  { animation: fadeUp .4s 1.9s both }
    .e4  { animation: fadeUp .4s 2.3s both }
    .e5  { animation: fadeUp .4s 2.7s both }

    .flow { stroke-dasharray:5 4; animation: dash 1.2s linear infinite; fill:none }
    .pulse-ring { animation: pulse 1.8s ease-in-out infinite }
    .pulse-dot  { animation: glow 1.8s ease-in-out infinite }
  </style>
</defs>

<!-- ── background ── -->
<rect width="680" height="480" fill="#0d1117" rx="12"/>

<!-- ── title ── -->
<text x="340" y="36" text-anchor="middle"
      font-family="'Segoe UI',system-ui,sans-serif" font-size="13"
      font-weight="600" fill="#7c3aed" letter-spacing="2">
  INTERRUPT-RESUME CYCLE
</text>

<!-- ════════════════════════════════════════
     NODES  (x-center=340, left col / right col for gate branches)
     y positions: 70 140 210 285 355 420 (step labels at +14)
     ════════════════════════════════════════ -->

<!-- Node 0 — START -->
<g class="n0">
  <rect x="270" y="60" width="160" height="38" rx="19" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="350" y="83" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="700" fill="#c4b5fd">▶  START</text>
</g>

<!-- edge 0 -->
<g class="e0">
  <line x1="350" y1="98" x2="350" y2="126" class="flow" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- Node 1 — topic_loader -->
<g class="n1">
  <rect x="190" y="130" width="320" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="350" y="150" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#a5b4fc">📥  topic_loader</text>
  <text x="350" y="167" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#6366f1">Fetches Wikipedia content for the concept</text>
</g>

<!-- edge 1 -->
<g class="e1">
  <line x1="350" y1="178" x2="350" y2="206" class="flow" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- Node 2 — strategy_selector -->
<g class="n2">
  <rect x="190" y="210" width="320" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="350" y="230" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#a5b4fc">🧭  strategy_selector</text>
  <text x="350" y="247" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#6366f1">Picks teaching strategy via STRATEGY_PRIORITY</text>
</g>

<!-- edge 2 -->
<g class="e2">
  <line x1="350" y1="258" x2="350" y2="286" class="flow" stroke="#10b981" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- Node 3 — explainer + question_gen (merged) -->
<g class="n3">
  <rect x="190" y="290" width="320" height="48" rx="7" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="350" y="310" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#6ee7b7">💡  explainer  →  ❓  question_gen</text>
  <text x="350" y="327" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#34d399">Explains · generates adaptive question · no leakage</text>
</g>

<!-- edge 3 — dashed amber leading to interrupt -->
<g class="e3">
  <line x1="350" y1="338" x2="350" y2="362" class="flow" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- Node 4 — INTERRUPT (amber, pulsing ring) -->
<g class="n4">
  <!-- outer pulse ring -->
  <rect x="182" y="363" width="336" height="44" rx="10" fill="none" stroke="#f59e0b" stroke-width="2" class="pulse-ring" opacity=".4"/>
  <rect x="190" y="366" width="320" height="38" rx="8" fill="#92400e" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="350" y="383" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#fde68a">⏸  INTERRUPT</text>
  <text x="350" y="397" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#fbbf24">interrupt_before=["response_evaluator"]  ·  state saved to SQLite</text>
</g>

<!-- student label between interrupt and evaluator -->
<g class="e4">
  <text x="430" y="428" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#f59e0b" opacity=".8">student submits answer</text>
  <line x1="350" y1="404" x2="350" y2="432" class="flow" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- Node 5 — response_evaluator -->
<g class="n5">
  <rect x="190" y="436" width="320" height="38" rx="7" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="350" y="453" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#fde68a">🔍  response_evaluator</text>
  <text x="350" y="467" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#fbbf24">Scores answer · detects misconception type · confidence 0–1</text>
</g>

<!-- ── RETRY LOOP arrow (right side, curves back up to strategy_selector) ── -->
<g class="e5">
  <!-- label -->
  <text x="584" y="355" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#f87171">❌  retry</text>
  <text x="584" y="367" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#f87171">new strategy</text>
  <!-- path: from right of evaluator → right gutter → up to strategy_selector right -->
  <path d="M510 455 Q570 455 570 390 Q570 234 510 234"
        fill="none" stroke="#ef4444" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- done label + arrow going down from evaluator -->
  <text x="248" y="483" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#6ee7b7">✅  confidence ≥ 0.8 or attempts ≥ 3</text>
</g>

<!-- ── legend row at bottom ── -->
<g opacity=".75" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5">
  <rect x="40" y="456" width="9" height="9" rx="2" fill="#1e1b4b" stroke="#6366f1" stroke-width=".8"/>
  <text x="53" y="465" fill="#6366f1">Agent node</text>

  <rect x="120" y="456" width="9" height="9" rx="2" fill="#064e3b" stroke="#10b981" stroke-width=".8"/>
  <text x="133" y="465" fill="#10b981">Teach &amp; ask</text>

  <rect x="200" y="456" width="9" height="9" rx="2" fill="#92400e" stroke="#f59e0b" stroke-width=".8"/>
  <text x="213" y="465" fill="#f59e0b">Interrupt</text>
</g>

</svg>
