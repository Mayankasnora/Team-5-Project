<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>EduTutor AI — Interrupt-Resume Cycle</title>
<desc>Animated step-by-step diagram of the LangGraph interrupt-resume cycle used in EduTutor AI</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    @keyframes fadeUp { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes dash   { to{stroke-dashoffset:-16} }
    @keyframes pulse  { 0%,100%{opacity:.25} 50%{opacity:.85} }

    .n0{animation:fadeUp .5s .1s both}
    .n1{animation:fadeUp .5s .5s both}
    .n2{animation:fadeUp .5s .9s both}
    .n3{animation:fadeUp .5s 1.3s both}
    .n4{animation:fadeUp .5s 1.7s both}
    .n5{animation:fadeUp .5s 2.1s both}
    .e0{animation:fadeUp .4s .7s both}
    .e1{animation:fadeUp .4s 1.1s both}
    .e2{animation:fadeUp .4s 1.5s both}
    .e3{animation:fadeUp .4s 1.9s both}
    .e4{animation:fadeUp .4s 2.3s both}
    .e5{animation:fadeUp .4s 2.5s both}
    .e6{animation:fadeUp .4s 2.7s both}

    .flow{stroke-dasharray:5 4;animation:dash 1.2s linear infinite;fill:none}
    .pr  {animation:pulse 1.8s ease-in-out infinite}
  </style>
</defs>

<!-- background -->
<rect width="680" height="560" fill="#0d1117" rx="12"/>

<!-- title -->
<text x="340" y="34" text-anchor="middle"
      font-family="'Segoe UI',system-ui,sans-serif" font-size="12"
      font-weight="600" fill="#7c3aed" letter-spacing="2">INTERRUPT-RESUME CYCLE</text>

<!-- ── NODE 0 — START ── -->
<g class="n0">
  <rect x="270" y="48" width="160" height="34" rx="17" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="350" y="69" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="700" fill="#c4b5fd">▶  START</text>
</g>

<!-- edge 0 -->
<g class="e0">
  <line x1="350" y1="82" x2="350" y2="106" class="flow" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- ── NODE 1 — topic_loader ── -->
<g class="n1">
  <rect x="190" y="110" width="320" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="350" y="130" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#a5b4fc">📥  topic_loader</text>
  <text x="350" y="147" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#6366f1">Fetches Wikipedia content for the concept</text>
</g>

<!-- edge 1 -->
<g class="e1">
  <line x1="350" y1="158" x2="350" y2="182" class="flow" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- ── NODE 2 — strategy_selector ── -->
<g class="n2">
  <rect x="190" y="186" width="320" height="48" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="350" y="206" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#a5b4fc">🧭  strategy_selector</text>
  <text x="350" y="223" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#6366f1">Picks teaching strategy via STRATEGY_PRIORITY</text>
</g>

<!-- edge 2 -->
<g class="e2">
  <line x1="350" y1="234" x2="350" y2="258" class="flow" stroke="#10b981" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- ── NODE 3 — explainer + question_gen ── -->
<g class="n3">
  <rect x="190" y="262" width="320" height="48" rx="7" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="350" y="282" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#6ee7b7">💡 explainer  →  ❓ question_gen</text>
  <text x="350" y="299" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#34d399">Explains · generates adaptive question · no leakage</text>
</g>

<!-- edge 3 -->
<g class="e3">
  <line x1="350" y1="310" x2="350" y2="334" class="flow" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- ── NODE 4 — INTERRUPT ── -->
<g class="n4">
  <rect x="182" y="335" width="336" height="46" rx="10" fill="none" stroke="#f59e0b" stroke-width="2" class="pr"/>
  <rect x="190" y="338" width="320" height="40" rx="8" fill="#92400e" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="350" y="356" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#fde68a">⏸  INTERRUPT</text>
  <text x="350" y="371" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#fbbf24">interrupt_before=["response_evaluator"]  ·  state saved to SQLite</text>
</g>

<!-- edge 4 — student submits -->
<g class="e4">
  <text x="436" y="398" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#f59e0b" opacity=".85">student submits answer</text>
  <line x1="350" y1="378" x2="350" y2="406" class="flow" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arr)"/>
</g>

<!-- ── NODE 5 — response_evaluator ── -->
<g class="n5">
  <rect x="190" y="410" width="320" height="48" rx="7" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="350" y="430" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="12" font-weight="700" fill="#fde68a">🔍  response_evaluator</text>
  <text x="350" y="447" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#fbbf24">Scores answer · detects misconception type · confidence 0–1</text>
</g>

<!-- ── RETRY arrow (right gutter: evaluator → strategy_selector) ── -->
<g class="e5">
  <text x="598" y="318" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#f87171">❌ retry</text>
  <text x="598" y="330" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#f87171">new strategy</text>
  <path d="M510 434 Q600 434 600 360 Q600 210 510 210"
        fill="none" stroke="#ef4444" stroke-width="1.1"
        stroke-dasharray="4 3" marker-end="url(#arr)"/>
</g>

<!-- ── DONE label + END node ── -->
<g class="e6">
  <text x="350" y="474" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#6ee7b7">✅ confidence ≥ 0.8 or attempts ≥ 3  →  mastery_recorder</text>
  <line x1="350" y1="458" x2="350" y2="494" class="flow" stroke="#10b981" stroke-width="1.3" marker-end="url(#arr)"/>
  <!-- END pill -->
  <rect x="270" y="498" width="160" height="34" rx="17" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="350" y="519" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="700" fill="#dcfce7">⏹  END</text>
</g>

<!-- ── legend ── -->
<g font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" opacity=".7">
  <rect x="40" y="536" width="9" height="9" rx="2" fill="#1e1b4b" stroke="#6366f1" stroke-width=".8"/>
  <text x="53" y="545" fill="#6366f1">Agent node</text>
  <rect x="130" y="536" width="9" height="9" rx="2" fill="#064e3b" stroke="#10b981" stroke-width=".8"/>
  <text x="143" y="545" fill="#10b981">Teach &amp; ask</text>
  <rect x="220" y="536" width="9" height="9" rx="2" fill="#92400e" stroke="#f59e0b" stroke-width=".8"/>
  <text x="233" y="545" fill="#f59e0b">Interrupt</text>
  <rect x="290" y="536" width="9" height="9" rx="2" fill="#78350f" stroke="#f59e0b" stroke-width=".8"/>
  <text x="303" y="545" fill="#fbbf24">Evaluate</text>
  <rect x="365" y="536" width="9" height="9" rx="2" fill="#14532d" stroke="#22c55e" stroke-width=".8"/>
  <text x="378" y="545" fill="#6ee7b7">Done</text>
</g>

</svg>
